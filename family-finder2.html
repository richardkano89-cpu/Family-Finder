<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Activity Finder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; }

header { background: #fff; border-bottom: 1px solid #e8eaf0; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; }
.logo { width: 36px; height: 36px; background: #4f46e5; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.logo svg { fill: white; }
header h1 { font-size: 1.2rem; font-weight: 600; }
header p { font-size: 0.78rem; color: #6b7280; }
.no-ads { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; padding: 5px 12px; border-radius: 6px; font-size: 0.73rem; font-weight: 600; margin-left: auto; white-space: nowrap; }

.search-bar { background: #fff; padding: 1.2rem 1.5rem; border-bottom: 1px solid #e8eaf0; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 0.72rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em; }
.field input, .field select { border: 1.5px solid #d1d5db; border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; outline: none; background: #fff; color: #1a1a2e; transition: border-color 0.2s; }
.field input:focus, .field select:focus { border-color: #4f46e5; }
.field input { width: 150px; }
.field select { width: 140px; }
.search-btn { background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 9px 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; height: 39px; align-self: flex-end; white-space: nowrap; }
.search-btn:hover { background: #4338ca; }
.search-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

.filters { background: #fff; padding: 0.7rem 1.5rem; border-bottom: 1px solid #e8eaf0; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.filters span { font-size: 0.73rem; font-weight: 600; color: #6b7280; }
.filter-btn { border: 1.5px solid #d1d5db; background: #fff; border-radius: 20px; padding: 4px 13px; font-size: 0.78rem; cursor: pointer; color: #374151; }
.filter-btn.active { background: #eef2ff; border-color: #4f46e5; color: #4f46e5; font-weight: 600; }

.results-wrap { max-width: 860px; margin: 0 auto; padding: 1.5rem; }
.results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.results-header h2 { font-size: 0.95rem; font-weight: 600; color: #374151; }
.results-header span { font-size: 0.82rem; color: #6b7280; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
.card { background: #fff; border-radius: 12px; padding: 1rem 1.1rem; border: 1.5px solid #e8eaf0; cursor: default; transition: border-color 0.15s, box-shadow 0.15s; }
.card:hover { border-color: #c7d2fe; box-shadow: 0 2px 10px rgba(79,70,229,0.08); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
.card h3 { font-size: 0.9rem; font-weight: 600; color: #1a1a2e; line-height: 1.3; }
.card .dist { font-size: 0.78rem; font-weight: 700; color: #4f46e5; white-space: nowrap; background: #eef2ff; padding: 2px 8px; border-radius: 8px; }
.card .cat-badge { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-bottom: 5px; }
.card .desc { font-size: 0.8rem; color: #6b7280; line-height: 1.45; }
.card .address { font-size: 0.77rem; color: #9ca3af; margin-top: 4px; }

.cat-park { background: #d1fae5; color: #065f46; }
.cat-museum { background: #dbeafe; color: #1e40af; }
.cat-library { background: #fce7f3; color: #9d174d; }
.cat-play { background: #fef3c7; color: #92400e; }
.cat-zoo { background: #dcfce7; color: #14532d; }
.cat-sports { background: #ede9fe; color: #5b21b6; }
.cat-other { background: #f3f4f6; color: #374151; }

.empty-state { text-align: center; padding: 4rem 2rem; color: #9ca3af; }
.empty-state svg { opacity: 0.25; margin-bottom: 12px; }
.empty-state p { font-size: 0.9rem; }
.loading { text-align: center; padding: 3rem 2rem; color: #6b7280; }
.spinner { width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 0.88rem; }
.error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; margin: 1rem 0; }
.stream-note { font-size: 0.78rem; color: #9ca3af; text-align: center; margin-top: 1rem; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  </div>
  <div>
    <h1>Family Activity Finder</h1>
    <p>Unbiased local discoveries for families with kids</p>
  </div>
  <div class="no-ads">No ads. No sponsors.</div>
</header>

<div class="search-bar">
  <div class="field">
    <label>UK Postcode</label>
    <input type="text" id="postcode" placeholder="e.g. SW1A 1AA" maxlength="8"/>
  </div>
  <div class="field">
    <label>Radius</label>
    <select id="radius">
      <option value="1">1 mile</option>
      <option value="2">2 miles</option>
      <option value="5" selected>5 miles</option>
      <option value="10">10 miles</option>
      <option value="20">20 miles</option>
    </select>
  </div>
  <button class="search-btn" id="searchBtn">Find Activities</button>
</div>

<div class="filters" id="filterRow" style="display:none">
  <span>Filter:</span>
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="park">Parks</button>
  <button class="filter-btn" data-cat="museum">Museums</button>
  <button class="filter-btn" data-cat="library">Libraries</button>
  <button class="filter-btn" data-cat="play">Play Areas</button>
  <button class="filter-btn" data-cat="zoo">Zoos & Farms</button>
  <button class="filter-btn" data-cat="sports">Sports & Leisure</button>
  <button class="filter-btn" data-cat="other">Other</button>
</div>

<div class="results-wrap">
  <div class="empty-state" id="emptyState">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="#6b7280"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    <p>Enter a UK postcode above to discover family activities near you.</p>
  </div>
  <div id="loadingState" style="display:none" class="loading">
    <div class="spinner"></div>
    <p id="loadingMsg">Finding activities near you...</p>
  </div>
  <div id="errorState" style="display:none"></div>
  <div id="resultsArea" style="display:none">
    <div class="results-header">
      <h2 id="resultsTitle">Nearby activities</h2>
      <span id="resultsCount"></span>
    </div>
    <div class="grid" id="grid"></div>
    <p class="stream-note">Results are AI-generated based on known locations near your postcode.</p>
  </div>
</div>

<script>
var allResults = [], activeCategory = 'all';

document.getElementById('postcode').addEventListener('keydown', function(e){ if(e.key==='Enter') doSearch(); });
document.getElementById('searchBtn').addEventListener('click', doSearch);
document.querySelectorAll('.filter-btn').forEach(function(btn){
  btn.addEventListener('click', function(){ filterCategory(this.dataset.cat, this); });
});

function catBadgeClass(cat){
  var m = {park:'cat-park',museum:'cat-museum',library:'cat-library',play:'cat-play',zoo:'cat-zoo',sports:'cat-sports',other:'cat-other'};
  return m[cat]||'cat-other';
}
function catLabel(cat){
  var m = {park:'Park',museum:'Museum',library:'Library',play:'Play Area',zoo:'Zoo / Farm',sports:'Sports & Leisure',other:'Attraction'};
  return m[cat]||'Attraction';
}

async function doSearch(){
  var pc = document.getElementById('postcode').value.trim().toUpperCase();
  var radius = document.getElementById('radius').value;
  if(!pc){ alert('Please enter a postcode.'); return; }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';
  document.getElementById('resultsArea').style.display = 'none';
  document.getElementById('filterRow').style.display = 'none';
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('searchBtn').disabled = true;
  allResults = [];

  var prompt = `You are a helpful local guide for UK families with children. A parent has entered postcode "${pc}" and wants to find family-friendly activities within ${radius} miles.

List up to 20 real, well-known places suitable for families with kids in and around that postcode area. Include a good mix of: parks, playgrounds, soft play centres, museums, libraries, zoos, farms, aquariums, amusement parks, leisure centres, nature reserves, and other child-friendly attractions.

Respond ONLY with a valid JSON array. No preamble, no markdown, no backticks. Each item must have these fields:
- "name": string (place name)
- "category": one of: park, museum, library, play, zoo, sports, other
- "distance": string like "2 miles" or "0.5 miles" (approximate distance from ${pc})
- "description": string (1 sentence, what makes it good for families)
- "address": string (town/area, e.g. "Battersea, London")

Only include real places. Sort by distance ascending.`;

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    var data = await res.json();
    var text = data.content && data.content[0] && data.content[0].text;
    if(!text) throw new Error('No response received.');

    console.log('RAW API response:', JSON.stringify(data));
    console.log('TEXT:', text);
    var match = text.match(/\[[\s\S]*\]/);
    if(!match) throw new Error('No JSON array found. Raw text: ' + text.substring(0, 200));
    allResults = JSON.parse(match[0]);
    if(!Array.isArray(allResults)) throw new Error('Unexpected response format.');

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('filterRow').style.display = 'flex';
    document.getElementById('resultsArea').style.display = 'block';
    activeCategory = 'all';
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
    document.getElementById('resultsTitle').textContent = 'Activities near ' + pc;
    renderResults();
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    var err = document.getElementById('errorState');
    err.style.display = 'block';
    err.innerHTML = '<div class="error-msg">Sorry, something went wrong: ' + (e.message||'Please try again.') + '</div>';
  }
  document.getElementById('searchBtn').disabled = false;
}

function renderResults(){
  var filtered = activeCategory === 'all' ? allResults : allResults.filter(function(r){ return r.category === activeCategory; });
  document.getElementById('resultsCount').textContent = filtered.length + ' found';
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  if(filtered.length === 0){
    grid.innerHTML = '<p style="color:#6b7280;font-size:0.85rem;padding:1rem 0">No results for this category. Try another filter.</p>';
    return;
  }
  filtered.forEach(function(r){
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<span class="cat-badge ' + catBadgeClass(r.category) + '">' + catLabel(r.category) + '</span>' +
      '<div class="card-top"><h3>' + r.name + '</h3><span class="dist">' + r.distance + '</span></div>' +
      (r.description ? '<p class="desc">' + r.description + '</p>' : '') +
      (r.address ? '<p class="address">' + r.address + '</p>' : '');
    grid.appendChild(card);
  });
}

function filterCategory(cat, btn){
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderResults();
}
</script>
</body>
</html>
